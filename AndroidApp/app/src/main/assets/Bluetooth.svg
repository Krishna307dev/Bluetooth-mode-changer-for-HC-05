<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <filter id="neon-glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <linearGradient id="cyan-gradient" x1="32" y1="0" x2="32" y2="64" gradientUnits="userSpaceOnUse">
            <stop stop-color="#00F0FF"/>
            <stop offset="1" stop-color="#00A8FF"/>
        </linearGradient>
    </defs>
    
    <!-- Outer Ring (Tech Vibe) -->
    <circle cx="32" cy="32" r="30" stroke="url(#cyan-gradient)" stroke-width="2" stroke-opacity="0.5" />
    <path d="M32 2V6M32 58V62M2 32H6M58 32H62" stroke="#00F0FF" stroke-width="2" stroke-linecap="round"/>

    <!-- Bluetooth Symbol (Resized -15%) -->
    <path d="M18 19L46 45L32 56V8L46 19L18 45" 
          stroke="#00F0FF" 
          stroke-width="4" 
          stroke-linecap="round" 
          stroke-linejoin="round"
          filter="url(#neon-glow)" 
          transform="translate(32, 32) scale(0.85) translate(-32, -32)" />
</svg>