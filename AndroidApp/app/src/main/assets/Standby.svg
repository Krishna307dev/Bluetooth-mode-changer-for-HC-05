<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <filter id="neon-glow-white" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <linearGradient id="chip-gradient" x1="32" y1="16" x2="32" y2="48" gradientUnits="userSpaceOnUse">
            <stop stop-color="#FFFFFF"/>
            <stop offset="1" stop-color="#888888"/>
        </linearGradient>
    </defs>
    
    <!-- Outer Ring (Tech Vibe) -->
    <circle cx="32" cy="32" r="30" stroke="rgba(0, 240, 255, 0.3)" stroke-width="2" />
    <path d="M32 2V6M32 58V62M2 32H6M58 32H62" stroke="rgba(0, 240, 255, 0.5)" stroke-width="2" stroke-linecap="round"/>

    <!-- Microchip / System Icon -->
    <g filter="url(#neon-glow-white)">
        <!-- Chip Body -->
        <rect x="20" y="20" width="24" height="24" rx="4" stroke="url(#chip-gradient)" stroke-width="2" fill="none"/>
        <!-- Circuit Traces -->
        <path d="M20 26H16M20 32H16M20 38H16" stroke="#AAAAAA" stroke-width="2" stroke-linecap="round"/>
        <path d="M44 26H48M44 32H48M44 38H48" stroke="#AAAAAA" stroke-width="2" stroke-linecap="round"/>
        <path d="M26 20V16M32 20V16M38 20V16" stroke="#AAAAAA" stroke-width="2" stroke-linecap="round"/>
        <path d="M26 44V48M32 44V48M38 44V48" stroke="#AAAAAA" stroke-width="2" stroke-linecap="round"/>
        <!-- Inner Core -->
        <rect x="27" y="27" width="10" height="10" rx="2" fill="#FFFFFF" fill-opacity="0.8"/>
    </g>
</svg>
